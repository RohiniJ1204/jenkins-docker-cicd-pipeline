version: '3.9'

services:
  frontend:
    build: ./frontend
    image: rohini1204/web-frontend
    container_name: frontend
    networks:
      - app-net

  backend:
    build: ./backend
    image: rohini1204/api-backend
    container_name: backend
    networks:
      - app-net

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-net

networks:
  app-net:
